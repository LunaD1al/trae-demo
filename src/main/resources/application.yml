spring:
  application:
    name: chatscope-backend
  profiles:
    default: local-consul
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always

chatscope:
  demo:
    group-id: ${CHATSCOPE_DEMO_GROUP_ID:chatscope_demo_group}
  bot:
    openim-user-id: ${CHATSCOPE_BOT_OPENIM_USER_ID:chatscope_bot}
  openim:
    api-base-url: ${CHATSCOPE_OPENIM_API_BASE_URL:http://127.0.0.1:10002}
    chat-api-base-url: ${CHATSCOPE_OPENIM_CHAT_API_BASE_URL:http://127.0.0.1:10008}
    admin-api-base-url: ${CHATSCOPE_OPENIM_ADMIN_API_BASE_URL:http://127.0.0.1:10009}
    secret: ${CHATSCOPE_OPENIM_SECRET:openIM123}
    admin-user-id: ${CHATSCOPE_OPENIM_ADMIN_USER_ID:imAdmin}
    bot-platform-id: ${CHATSCOPE_OPENIM_BOT_PLATFORM_ID:5}
    allow-public-direct-access: ${CHATSCOPE_OPENIM_ALLOW_PUBLIC_DIRECT_ACCESS:false}
    callback-secret: ${CHATSCOPE_OPENIM_CALLBACK_SECRET:}
  ai:
    default-daily-limit: ${CHATSCOPE_AI_DEFAULT_DAILY_LIMIT:20}
    quota-timezone: ${CHATSCOPE_AI_QUOTA_TIMEZONE:Asia/Shanghai}
  memory:
    mini-window-minutes: ${CHATSCOPE_MEMORY_MINI_WINDOW_MINUTES:5}
    archive-window-minutes: ${CHATSCOPE_MEMORY_ARCHIVE_WINDOW_MINUTES:30}
    demo-archive-window-minutes: ${CHATSCOPE_MEMORY_DEMO_ARCHIVE_WINDOW_MINUTES:5}
  abuse:
    challenge-enabled: ${CHATSCOPE_ABUSE_CHALLENGE_ENABLED:true}
    code-resend-cooldown-seconds: ${CHATSCOPE_ABUSE_CODE_RESEND_COOLDOWN_SECONDS:60}
    sms:
      global-daily-budget: ${CHATSCOPE_ABUSE_SMS_GLOBAL_DAILY_BUDGET:800}
      per-ip-per-minute: ${CHATSCOPE_ABUSE_SMS_PER_IP_PER_MINUTE:3}
      per-ip-per-hour: ${CHATSCOPE_ABUSE_SMS_PER_IP_PER_HOUR:10}
      per-target-per-hour: ${CHATSCOPE_ABUSE_SMS_PER_TARGET_PER_HOUR:3}
      per-target-per-day: ${CHATSCOPE_ABUSE_SMS_PER_TARGET_PER_DAY:8}
      per-cidr-per-day: ${CHATSCOPE_ABUSE_SMS_PER_CIDR_PER_DAY:50}
    smtp:
      global-daily-budget: ${CHATSCOPE_ABUSE_SMTP_GLOBAL_DAILY_BUDGET:2000}
      per-ip-per-minute: ${CHATSCOPE_ABUSE_SMTP_PER_IP_PER_MINUTE:5}
      per-ip-per-hour: ${CHATSCOPE_ABUSE_SMTP_PER_IP_PER_HOUR:20}
      per-target-per-hour: ${CHATSCOPE_ABUSE_SMTP_PER_TARGET_PER_HOUR:5}
      per-target-per-day: ${CHATSCOPE_ABUSE_SMTP_PER_TARGET_PER_DAY:20}
      per-cidr-per-day: ${CHATSCOPE_ABUSE_SMTP_PER_CIDR_PER_DAY:100}
    registration:
      per-ip-per-hour: ${CHATSCOPE_ABUSE_REG_PER_IP_PER_HOUR:3}
      per-ip-per-day: ${CHATSCOPE_ABUSE_REG_PER_IP_PER_DAY:10}
      per-cidr-per-day: ${CHATSCOPE_ABUSE_REG_PER_CIDR_PER_DAY:50}
      verify-failure-lock-threshold: ${CHATSCOPE_ABUSE_REG_VERIFY_FAILURE_LOCK_THRESHOLD:5}
      verify-failure-lock-minutes: ${CHATSCOPE_ABUSE_REG_VERIFY_FAILURE_LOCK_MINUTES:15}
    ai:
      per-ip-per-minute: ${CHATSCOPE_ABUSE_AI_PER_IP_PER_MINUTE:20}
      per-user-per-minute: ${CHATSCOPE_ABUSE_AI_PER_USER_PER_MINUTE:10}
