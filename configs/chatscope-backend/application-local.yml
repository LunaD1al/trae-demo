spring:
  config:
    activate:
      on-profile: local-consul
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://100.89.110.91:5432/chatscope}
    username: ${SPRING_DATASOURCE_USERNAME:chatscope_app}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      # Consul service cache-redis passing address, not local fallback Docker Redis.
      host: ${SPRING_DATA_REDIS_HOST:100.105.213.32}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:100.89.110.91:9092}
    client-id: chatscope-backend-local
    consumer:
      group-id: chatscope-backend-local
      auto-offset-reset: earliest

chatscope:
  consul:
    url: ${CHATSCOPE_CONSUL_URL:http://100.89.110.91:8500}
  demo:
    group-id: ${CHATSCOPE_DEMO_GROUP_ID:chatscope_demo_group}
  bot:
    openim-user-id: ${CHATSCOPE_BOT_OPENIM_USER_ID:chatscope_bot}
  openim:
    api-base-url: ${CHATSCOPE_OPENIM_API_BASE_URL:http://127.0.0.1:10002}
    chat-api-base-url: ${CHATSCOPE_OPENIM_CHAT_API_BASE_URL:http://127.0.0.1:10008}
    admin-api-base-url: ${CHATSCOPE_OPENIM_ADMIN_API_BASE_URL:http://127.0.0.1:10009}
    allow-public-direct-access: ${CHATSCOPE_OPENIM_ALLOW_PUBLIC_DIRECT_ACCESS:false}
    callback-secret: ${CHATSCOPE_OPENIM_CALLBACK_SECRET:}
  ai:
    default-daily-limit: ${CHATSCOPE_AI_DEFAULT_DAILY_LIMIT:20}
    quota-timezone: ${CHATSCOPE_AI_QUOTA_TIMEZONE:Asia/Shanghai}
  memory:
    mini-window-minutes: ${CHATSCOPE_MEMORY_MINI_WINDOW_MINUTES:5}
    archive-window-minutes: ${CHATSCOPE_MEMORY_ARCHIVE_WINDOW_MINUTES:30}
    demo-archive-window-minutes: ${CHATSCOPE_MEMORY_DEMO_ARCHIVE_WINDOW_MINUTES:5}

deepseek:
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  api-key: ${DEEPSEEK_API_KEY:}

admin:
  token: ${CHATSCOPE_ADMIN_TOKEN:}

